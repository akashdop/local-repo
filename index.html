<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A premium scientific calculator with trigonometric, logarithmic, and advanced math functions. Beautiful dark-themed UI.">
    <title>Scientific Calculator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <div class="calculator" id="calculator">
            <!-- Header -->
            <div class="calc-header">
                <h1>Scientific Calculator</h1>
                <div class="mode-toggle" id="mode-toggle">
                    <button class="mode-btn active" id="deg-btn" data-mode="DEG">DEG</button>
                    <button class="mode-btn" id="rad-btn" data-mode="RAD">RAD</button>
                </div>
            </div>

            <!-- Display -->
            <div class="display" id="display">
                <div class="display-history" id="display-history"></div>
                <div class="display-current" id="display-current">0</div>
                <div class="display-indicator">
                    <span class="indicator-mode" id="indicator-mode">DEG</span>
                    <span class="indicator-memory" id="indicator-memory"></span>
                </div>
            </div>

            <!-- Memory Buttons -->
            <div class="btn-row memory-row">
                <button class="btn btn-memory" id="btn-mc" data-action="mc">MC</button>
                <button class="btn btn-memory" id="btn-mr" data-action="mr">MR</button>
                <button class="btn btn-memory" id="btn-mplus" data-action="m+">M+</button>
                <button class="btn btn-memory" id="btn-mminus" data-action="m-">M−</button>
            </div>

            <!-- Scientific Buttons Row 1 -->
            <div class="btn-row">
                <button class="btn btn-scientific" id="btn-sin" data-action="sin">sin</button>
                <button class="btn btn-scientific" id="btn-cos" data-action="cos">cos</button>
                <button class="btn btn-scientific" id="btn-tan" data-action="tan">tan</button>
                <button class="btn btn-scientific" id="btn-pi" data-action="π">π</button>
                <button class="btn btn-scientific" id="btn-e" data-action="e">e</button>
            </div>

            <!-- Scientific Buttons Row 2 -->
            <div class="btn-row">
                <button class="btn btn-scientific" id="btn-ln" data-action="ln">ln</button>
                <button class="btn btn-scientific" id="btn-log" data-action="log">log</button>
                <button class="btn btn-scientific" id="btn-sqrt" data-action="√">√</button>
                <button class="btn btn-scientific" id="btn-pow" data-action="^">xʸ</button>
                <button class="btn btn-scientific" id="btn-fact" data-action="!">x!</button>
            </div>

            <!-- Scientific Buttons Row 3 -->
            <div class="btn-row">
                <button class="btn btn-scientific" id="btn-sqr" data-action="x²">x²</button>
                <button class="btn btn-scientific" id="btn-inv" data-action="1/x">1/x</button>
                <button class="btn btn-scientific" id="btn-abs" data-action="|x|">|x|</button>
                <button class="btn btn-scientific" id="btn-paren-open" data-action="(">(</button>
                <button class="btn btn-scientific" id="btn-paren-close" data-action=")">)</button>
            </div>

            <!-- Main Buttons -->
            <div class="btn-row">
                <button class="btn btn-action" id="btn-ac" data-action="AC">AC</button>
                <button class="btn btn-action" id="btn-del" data-action="DEL">⌫</button>
                <button class="btn btn-action" id="btn-percent" data-action="%">%</button>
                <button class="btn btn-operator" id="btn-divide" data-action="÷">÷</button>
            </div>

            <div class="btn-row">
                <button class="btn btn-digit" id="btn-7" data-action="7">7</button>
                <button class="btn btn-digit" id="btn-8" data-action="8">8</button>
                <button class="btn btn-digit" id="btn-9" data-action="9">9</button>
                <button class="btn btn-operator" id="btn-multiply" data-action="×">×</button>
            </div>

            <div class="btn-row">
                <button class="btn btn-digit" id="btn-4" data-action="4">4</button>
                <button class="btn btn-digit" id="btn-5" data-action="5">5</button>
                <button class="btn btn-digit" id="btn-6" data-action="6">6</button>
                <button class="btn btn-operator" id="btn-subtract" data-action="−">−</button>
            </div>

            <div class="btn-row">
                <button class="btn btn-digit" id="btn-1" data-action="1">1</button>
                <button class="btn btn-digit" id="btn-2" data-action="2">2</button>
                <button class="btn btn-digit" id="btn-3" data-action="3">3</button>
                <button class="btn btn-operator" id="btn-add" data-action="+">+</button>
            </div>

            <div class="btn-row">
                <button class="btn btn-digit" id="btn-negate" data-action="±">±</button>
                <button class="btn btn-digit" id="btn-0" data-action="0">0</button>
                <button class="btn btn-digit" id="btn-dot" data-action=".">.</button>
                <button class="btn btn-equals" id="btn-equals" data-action="=">=</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
